<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nihar16 | GitHub Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0D1117;
      --bg2: #0a0f16;
      --blue: #00BFFF;
      --blue2: #4D9FD6;
      --border: #1A3A5C;
      --glow: 0 0 18px rgba(0,191,255,0.35), 0 0 40px rgba(0,191,255,0.12);
      --card-bg: rgba(13,20,30,0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--blue2);
      font-family: 'Source Code Pro', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,191,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,191,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* ── Hero Banner ── */
    .hero {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.8s ease both;
    }

    .hero img {
      width: 100%;
      max-width: 640px;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--glow);
      transition: box-shadow 0.3s;
    }

    .hero img:hover {
      box-shadow: 0 0 30px rgba(0,191,255,0.6), 0 0 60px rgba(0,191,255,0.2);
    }

    /* ── Badges ── */
    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .badges a img, .badges img {
      height: 24px;
      border-radius: 4px;
      transition: transform 0.2s, filter 0.2s;
      filter: brightness(0.9);
    }

    .badges a img:hover, .badges img:hover {
      transform: translateY(-2px);
      filter: brightness(1.2) drop-shadow(0 0 6px var(--blue));
    }

    /* ── Section Headers ── */
    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── Cards / Sections ── */
    .section {
      margin-bottom: 40px;
      animation: fadeUp 0.8s ease both;
    }

    .section:nth-child(2) { animation-delay: 0.1s; }
    .section:nth-child(3) { animation-delay: 0.2s; }
    .section:nth-child(4) { animation-delay: 0.3s; }
    .section:nth-child(5) { animation-delay: 0.4s; }
    .section:nth-child(6) { animation-delay: 0.5s; }

    .glow-card {
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--glow);
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .glow-card:hover {
      box-shadow: 0 0 28px rgba(0,191,255,0.55), 0 0 55px rgba(0,191,255,0.18);
      transform: translateY(-3px);
    }

    /* ── Pacman Graph ── */
    .pacman-wrap {
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      box-shadow: var(--glow);
    }

    .pacman-wrap picture img {
      width: 100%;
      max-width: 860px;
      border-radius: 6px;
    }

    /* ── Trophies ── */
    .trophies-wrap {
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      box-shadow: var(--glow);
    }

    .trophies-wrap img {
      max-width: 100%;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .stats-row img {
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
    }

    /* ── WakaTime Charts ── */
    .charts-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .charts-row img {
      width: 100%;
      max-width: 415px;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--glow);
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .charts-row img:hover {
      box-shadow: 0 0 28px rgba(0,191,255,0.55);
      transform: translateY(-3px);
    }

    /* ── Quote ── */
    .quote {
      text-align: center;
      margin-top: 48px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      box-shadow: var(--glow);
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .quote p {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.05em;
    }

    .quote p::before { content: '> '; opacity: 0.5; }

    /* ── Terminal cursor blink ── */
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: var(--blue);
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .section-title { font-size: 0.85rem; }
      .quote p { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
