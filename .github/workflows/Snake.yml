name: Generate Snake

on:
  schedule:
    - cron: "0 * * * *" # or your custom schedule

jobs:
  build:
    runs-on: ubuntu-latest  # ✅ MUST be a valid GitHub-hosted runner

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@master
        with:
          github_user_name: Nihar16
          outputs: |
            dist/github-snake.svg

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: snake
          path: dist
